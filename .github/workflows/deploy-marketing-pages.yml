name: Deploy Marketing site (GitHub Pages)

# Publishes the static export of /marketing to GitHub Pages.
# The site is fully static (Next.js `output: export`), so it can be hosted
# directly on GitHub and reached via the repo's github.io URL.
# Scoped to marketing/** so it never interferes with the app/backend.

on:
  push:
    branches: [main]
    paths:
      - "marketing/**"
      - ".github/workflows/deploy-marketing-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: marketing-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: marketing/package-lock.json
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (source = GitHub Actions) if not already on.
          enablement: true
      - name: Install dependencies
        working-directory: marketing
        run: npm ci
      - name: Build static export
        working-directory: marketing
        env:
          # base_path resolves to "/<repo>" automatically (correct case).
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # TODO: set this secret to the live app URL (login/signup target).
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: marketing/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
